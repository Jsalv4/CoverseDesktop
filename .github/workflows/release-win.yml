name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne "v$pkgVersion") {
            throw "Tag '$tag' does not match package version 'v$pkgVersion'."
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Detect Windows signing configuration
        if: runner.os == 'Windows'
        id: windows_signing
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host 'Windows signing is enabled.'
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host 'Windows signing secrets are missing. Falling back to unsigned build.'
          }

      - name: Detect macOS signing/notarization configuration
        if: runner.os == 'macOS'
        id: mac_signing
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "$MAC_CSC_LINK" ] && [ -n "$MAC_CSC_KEY_PASSWORD" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization secrets are missing. Falling back to unsigned macOS publish."
          fi

      - name: Build and publish Windows assets (signed)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run release:win

      - name: Build and publish Windows assets (unsigned)
        if: runner.os == 'Windows' && steps.windows_signing.outputs.enabled != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          Write-Host 'Windows signing secrets are not configured. Publishing unsigned Windows assets.'
          npm run release:win

      - name: Build and publish macOS assets (signed)
        if: runner.os == 'macOS' && steps.mac_signing.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:mac

      - name: Build and publish macOS assets (unsigned)
        if: runner.os == 'macOS' && steps.mac_signing.outputs.enabled != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          echo "Signing secrets not configured. Publishing unsigned macOS assets."
          npm run release:mac

      - name: Verify macOS Gatekeeper acceptance
        if: runner.os == 'macOS' && steps.mac_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          app_count=0
          shopt -s nullglob
          for app_path in dist/mac*/Coverse.app; do
            app_count=$((app_count + 1))
            echo "Verifying signature: $app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
            echo "Assessing Gatekeeper acceptance: $app_path"
            spctl --assess --type execute --verbose=4 "$app_path"
          done

          if [ "$app_count" -eq 0 ]; then
            echo "No macOS app bundles found in dist/mac*" >&2
            exit 1
          fi
